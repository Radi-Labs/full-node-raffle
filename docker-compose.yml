services:
  webapp:
    build: .
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      # Persist raffle state across container restarts
      - raffle-data:/data
    environment:
      FLASK_SECRET: ${FLASK_SECRET:?Set FLASK_SECRET in .env}
      RAFFLE_STATE: /data/raffle_state.json
      RAFFLE_PASSWORD: ${RAFFLE_PASSWORD:-}
      MAX_ENTRIES_PER_IP: ${MAX_ENTRIES_PER_IP:-1}
      PORT: 5000
    restart: unless-stopped

volumes:
  raffle-data:
