<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Bitcoin Node Raffle — Operator{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="brand" href="/">
      <div class="brand-icon">₿</div>
      <div class="brand-text">
        <div class="brand-name">Bitcoin Node Raffle</div>
        <div class="brand-tag">Operator dashboard</div>
      </div>
    </a>
    <div class="topbar-links">
      <a href="/verify.html">public verifier</a>
      <a href="#" class="pill-link">operator</a>
    </div>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, msg in messages %}
      <div class="flash {{ category }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
